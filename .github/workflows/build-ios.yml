name: Build iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate native iOS project
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Build app
        run: |
          cd ios
          xcodebuild -workspace Sendy.xcworkspace \
            -scheme Sendy \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath $PWD/build/Sendy.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r ios/build/Sendy.xcarchive/Products/Applications/Sendy.app Payload/
          zip -r Sendy.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Sendy-iOS
          path: Sendy.ipa
